<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f2848" />
  <meta name="description" content="ÖZN LuckyCare yönetim yapısı ve kurumsal ekip sayfası." />
  <title>Biz Kimiz | ÖZN LuckyCare</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/sektor-page.css" />
  <style>
    .about-hero {
      padding: 64px 0 28px;
      text-align: center;
    }
    .about-logo {
      margin: 0 auto 22px;
      width: fit-content;
      padding: 14px 24px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid rgba(125, 211, 252, 0.35);
      box-shadow: 0 0 24px rgba(59, 130, 246, 0.22), 0 4px 16px rgba(0, 0, 0, 0.2);
    }
    .about-logo img {
      height: 66px;
      width: auto;
      max-width: 240px;
      object-fit: contain;
      display: block;
    }
    .about-reel {
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(10px);
    }
    .about-video-wrap {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      aspect-ratio: 16 / 9;
      border-radius: 14px;
      overflow: hidden;
      background: #050a12;
    }
    .about-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    @media (max-width: 900px) {
      .about-hero { padding-top: 42px; }
    }
  </style>
</head>
<body class="sektor-page">
  <header class="page-header">
    <div class="page-header-inner">
      <a href="index.html" class="brand-lockup" aria-label="ÖZN LuckyCare ana sayfa">
        <span class="brand-lockup__mark">
          <img src="assets/logo.png" width="200" height="60" alt="ÖZN LuckyCare" decoding="async" />
        </span>
        <span class="brand-lockup__text">
          <span class="brand-lockup__name">ÖZN LuckyCare</span>
          <span class="brand-lockup__tag">Teknoloji · Özen · Yaşam</span>
        </span>
      </a>
      <nav class="page-nav" aria-label="Sayfa menüsü">
        <a href="index.html">Ana sayfa</a>
        <a href="index.html#sektorler">Sektörler</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-body">
      <div class="container">
        <p class="back-row"><a class="back-link" href="index.html">← Ana sayfaya dön</a></p>

        <section class="about-hero" aria-labelledby="biz-kimiz-title">
          <div class="about-logo">
            <img src="assets/logo.png" width="230" height="66" alt="ÖZN LuckyCare logosu" decoding="async" />
          </div>
          <p class="page-kicker">Kurumsal</p>
          <h1 id="biz-kimiz-title">Biz Kimiz</h1>
          <p class="page-lead">Kurumsal tanıtım</p>
        </section>

        <section class="about-reel" aria-label="Biz Kimiz tanıtım videosu">
          <div class="about-video-wrap">
            <video class="about-video" controls playsinline webkit-playsinline preload="metadata" poster="assets/logo.png" width="1280" height="720">
              <source src="video/biz-kimiz-v1.mp4" type="video/mp4" />
              Tarayıcınız video oynatmayı desteklemiyor.
            </video>
          </div>
        </section>
      </div>
    </section>
  </main>

  <footer class="page-footer">
    <div class="page-footer-inner">
      <a href="index.html" class="page-footer-brand" aria-label="Ana sayfaya dön">
        <img src="assets/logo.png" width="200" height="60" alt="ÖZN LuckyCare" decoding="async" />
      </a>
      <p class="page-footer-copy"><strong>ÖZN LuckyCare</strong> · <a href="index.html">Ana sayfa</a></p>
    </div>
  </footer>
</body>
</html>
